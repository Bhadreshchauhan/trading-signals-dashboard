name: Signal Scanner

on:
  schedule:
    - cron: '0 11 * * 5'   # Every Friday 11:00 UTC (16:30 IST)
  workflow_dispatch:         # Manual trigger from dashboard or GitHub UI

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: scanner/requirements.txt

      - name: Install dependencies
        run: pip install -r scanner/requirements.txt

      - name: Run scanner
        working-directory: scanner
        env:
          SUPABASE_URL:              ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python main.py
